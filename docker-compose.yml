services:
  backend:
    build: .
    container_name: openshorts-backend
    ports:
      - "8001:8000"
    volumes:
      - openshorts-output:/app/output
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: openshorts-frontend
    ports:
      - "5175:5173"
    restart: unless-stopped
    depends_on:
      - backend

  renderer:
    build:
      context: .
      dockerfile: render-service/Dockerfile
    container_name: openshorts-renderer
    ports:
      - "3100:3100"
    volumes:
      - openshorts-output:/output
    environment:
      - REMOTION_BUNDLE_PATH=/app/remotion
      - OUTPUT_DIR=/output
      - PORT=3100
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  openshorts-output:
